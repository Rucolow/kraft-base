<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>KRAFT BASE スタッフ把握度チェック</title>
    <style>
      :root {
        --orange: #d67a2e;
        --teal: #0f3d3d;
        --cream: #f5f0e6;
        --ink: #23332f;
        --ink-soft: #5b6863;
        --line: #ddd5c4;
        --paper: #fffdf8;
        --high-bg: #f6e1da;
        --high-ink: #b23a26;
        --mid-bg: #f4ebcf;
        --mid-ink: #9a6b15;
        --low-bg: #ebe9e0;
        --low-ink: #6c6c62;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
          "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
        color: var(--ink);
        background: var(--cream);
        line-height: 1.6;
        -webkit-text-size-adjust: 100%;
      }
      header.app {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--teal);
        color: #fdf7ec;
        padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
        box-shadow: 0 2px 10px rgba(15, 61, 61, 0.18);
      }
      .brand {
        font-size: 1.02rem;
        font-weight: 700;
        letter-spacing: 0.16em;
      }
      .brand .accent {
        color: var(--orange);
      }
      .sub {
        font-size: 0.74rem;
        opacity: 0.82;
        margin-top: 2px;
      }
      .bar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
        align-items: center;
      }
      .seg {
        display: inline-flex;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 3px;
      }
      .seg button {
        border: 0;
        background: transparent;
        color: #fdf7ec;
        font-weight: 700;
        font-size: 0.82rem;
        padding: 7px 14px;
        border-radius: 999px;
        cursor: pointer;
      }
      .seg button.active {
        background: var(--orange);
        color: #fff;
      }
      .tools {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-left: auto;
      }
      .tool {
        border: 1px solid rgba(255, 255, 255, 0.45);
        background: transparent;
        color: #fdf7ec;
        font-size: 0.74rem;
        font-weight: 600;
        padding: 6px 10px;
        border-radius: 8px;
        cursor: pointer;
      }
      .tool:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .progress-wrap {
        margin-top: 10px;
      }
      .progress-track {
        height: 8px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--orange);
        width: 0%;
        transition: width 0.2s;
      }
      .progress-label {
        font-size: 0.72rem;
        opacity: 0.85;
        margin-top: 4px;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 16px 14px 80px;
      }
      .chapter {
        margin-bottom: 26px;
      }
      .chapter-head {
        display: flex;
        align-items: baseline;
        gap: 10px;
        border-bottom: 2px solid var(--teal);
        padding-bottom: 6px;
        margin-bottom: 12px;
      }
      .chapter-id {
        font-weight: 800;
        color: var(--teal);
        font-size: 1.05rem;
      }
      .chapter-title {
        font-weight: 700;
        flex: 1;
      }
      .chapter-prog {
        font-size: 0.74rem;
        color: var(--ink-soft);
        white-space: nowrap;
      }
      .item {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 13px;
        margin-bottom: 10px;
      }
      .item-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .item-id {
        font-weight: 700;
        font-size: 0.78rem;
        color: var(--ink-soft);
        font-variant-numeric: tabular-nums;
      }
      .badge {
        font-size: 0.68rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .sev-high {
        background: var(--high-bg);
        color: var(--high-ink);
      }
      .sev-mid {
        background: var(--mid-bg);
        color: var(--mid-ink);
      }
      .sev-low {
        background: var(--low-bg);
        color: var(--low-ink);
      }
      .who {
        font-size: 0.7rem;
        color: var(--ink-soft);
        background: #eef1ec;
        border-radius: 999px;
        padding: 2px 8px;
      }
      .q {
        font-size: 0.95rem;
        margin: 2px 0 10px;
      }
      .aw {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 9px;
      }
      .aw button {
        flex: 1;
        min-width: 92px;
        border: 1.5px solid var(--line);
        background: #fff;
        color: var(--ink-soft);
        font-weight: 700;
        font-size: 0.84rem;
        padding: 9px 6px;
        border-radius: 9px;
        cursor: pointer;
      }
      .aw button[data-val="known"].on {
        background: var(--teal);
        border-color: var(--teal);
        color: #fff;
      }
      .aw button[data-val="vague"].on {
        background: var(--orange);
        border-color: var(--orange);
        color: #fff;
      }
      .aw button[data-val="unknown"].on {
        background: var(--high-ink);
        border-color: var(--high-ink);
        color: #fff;
      }
      textarea {
        width: 100%;
        min-height: 64px;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 9px 10px;
        font: inherit;
        font-size: 0.9rem;
        background: #fff;
        color: var(--ink);
        resize: vertical;
      }
      textarea:focus {
        outline: none;
        border-color: var(--orange);
      }
      .saved {
        font-size: 0.66rem;
        color: var(--ink-soft);
        margin-top: 3px;
        min-height: 0.9em;
      }
      /* review */
      .summary {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 16px;
      }
      .summary h2 {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: var(--teal);
      }
      .counts {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }
      .count {
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 11px;
        font-size: 0.8rem;
        background: #fff;
      }
      .count b {
        font-size: 1.05rem;
        font-variant-numeric: tabular-nums;
      }
      table.cross {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      table.cross th,
      table.cross td {
        border: 1px solid var(--line);
        padding: 6px 8px;
        text-align: center;
      }
      table.cross th {
        background: #eef1ec;
        font-weight: 700;
      }
      table.cross td.rowhead {
        font-weight: 700;
        background: #f7f4ec;
        text-align: left;
      }
      table.cross td.alert {
        background: var(--high-bg);
        color: var(--high-ink);
        font-weight: 800;
      }
      .filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 14px;
        align-items: center;
      }
      .filters .group {
        display: inline-flex;
        gap: 4px;
        flex-wrap: wrap;
        align-items: center;
      }
      .filters .glabel {
        font-size: 0.72rem;
        color: var(--ink-soft);
        margin-right: 2px;
      }
      .chip {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink-soft);
        font-size: 0.74rem;
        font-weight: 600;
        padding: 4px 9px;
        border-radius: 999px;
        cursor: pointer;
      }
      .chip.on {
        background: var(--teal);
        border-color: var(--teal);
        color: #fff;
      }
      .ritem {
        background: var(--paper);
        border: 1px solid var(--line);
        border-left-width: 5px;
        border-radius: 10px;
        padding: 11px 12px;
        margin-bottom: 9px;
      }
      .ritem.aw-unknown {
        border-left-color: var(--high-ink);
      }
      .ritem.aw-vague {
        border-left-color: var(--orange);
      }
      .ritem.aw-none {
        border-left-color: #b9b2a0;
      }
      .ritem.aw-known {
        border-left-color: var(--teal);
      }
      .rstate {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 999px;
      }
      .st-unknown {
        background: var(--high-bg);
        color: var(--high-ink);
      }
      .st-vague {
        background: var(--mid-bg);
        color: var(--mid-ink);
      }
      .st-none {
        background: #e7e3d8;
        color: #6c6c62;
      }
      .st-known {
        background: #dceae2;
        color: #1f6b4d;
      }
      .answer {
        margin-top: 7px;
        font-size: 0.88rem;
        white-space: pre-wrap;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
      }
      .answer.empty {
        color: #a59c8a;
        font-style: italic;
      }
      .empty-list {
        text-align: center;
        color: var(--ink-soft);
        padding: 30px 10px;
      }
      .foot {
        text-align: center;
        font-size: 0.7rem;
        color: var(--ink-soft);
        margin-top: 24px;
      }
      @media (max-width: 520px) {
        .tools {
          margin-left: 0;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="app">
      <div class="brand">KRAFT <span class="accent">BASE</span> ・ スタッフ把握度チェック</div>
      <div class="sub">運用上の想定問題・ゲストからの質問の把握度を炙り出す調査ツール</div>
      <div class="bar">
        <div class="seg">
          <button id="mode-input" class="active" type="button">入力モード</button>
          <button id="mode-review" type="button">レビューモード</button>
        </div>
        <div class="tools">
          <button class="tool" id="btn-export-json" type="button">JSONを書き出す</button>
          <button class="tool" id="btn-import-json" type="button">JSONを読み込む</button>
          <button class="tool" id="btn-export-md" type="button">Markdownで書き出す</button>
          <input
            id="file-input"
            type="file"
            accept="application/json,.json"
            style="display: none"
          />
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
        <div class="progress-label" id="prog-label"></div>
      </div>
    </header>

    <main id="view"></main>

    <script>
      (function () {
        "use strict";

        var RAW = JSON.parse(document.getElementById("questions-data").textContent);
        var CHAPTERS = RAW.chapters;
        var ITEMS = RAW.items;
        var STORE_KEY = "kraftbase_staff_check_v1";

        var WHO = { all: "全員", day: "日中", night: "夜", morning: "朝" };
        var SEV_LABEL = { high: "重要度 高", mid: "重要度 中", low: "重要度 低" };
        var AW_LABEL = { known: "わかる", vague: "曖昧", unknown: "わからない" };

        var view = document.getElementById("view");
        var mode = "input";
        var saveTimer = null;

        // filters for review mode (Set semantics; empty = no filtering for that group)
        var filters = { awareness: new Set(), severity: new Set(), chapter: new Set() };

        function loadResponses() {
          try {
            var raw = localStorage.getItem(STORE_KEY);
            if (!raw) return {};
            var parsed = JSON.parse(raw);
            return parsed && typeof parsed === "object" ? parsed : {};
          } catch (e) {
            return {};
          }
        }

        var responses = loadResponses();

        function persist() {
          localStorage.setItem(STORE_KEY, JSON.stringify(responses));
        }

        function resp(id) {
          return responses[id] || { awareness: null, answer: "", updatedAt: null };
        }

        function setAwareness(id, value) {
          var cur = resp(id);
          var next = cur.awareness === value ? null : value; // toggle off if same
          responses[id] = {
            awareness: next,
            answer: cur.answer || "",
            updatedAt: new Date().toISOString(),
          };
          persist();
        }

        function setAnswer(id, text) {
          var cur = resp(id);
          responses[id] = {
            awareness: cur.awareness == null ? null : cur.awareness,
            answer: text,
            updatedAt: new Date().toISOString(),
          };
          if (saveTimer) clearTimeout(saveTimer);
          saveTimer = setTimeout(persist, 350);
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function whoLabel(who) {
          return (who || [])
            .map(function (w) {
              return WHO[w] || w;
            })
            .join("・");
        }

        function answeredCount() {
          return ITEMS.filter(function (it) {
            return resp(it.id).awareness != null;
          }).length;
        }

        function updateProgress() {
          var done = answeredCount();
          var total = ITEMS.length;
          var pct = total ? Math.round((done / total) * 100) : 0;
          document.getElementById("prog-fill").style.width = pct + "%";
          document.getElementById("prog-label").textContent =
            "把握度 入力済み " + done + " / 全 " + total + " 項目（" + pct + "%）";
        }

        // ---------- input mode ----------
        function renderInput() {
          var html = "";
          CHAPTERS.forEach(function (ch) {
            var items = ITEMS.filter(function (it) {
              return it.chapter === ch.id;
            });
            var blank = items.filter(function (it) {
              return resp(it.id).awareness == null;
            }).length;
            html += '<section class="chapter">';
            html +=
              '<div class="chapter-head"><span class="chapter-id">' +
              esc(ch.id) +
              '</span><span class="chapter-title">' +
              esc(ch.title) +
              '</span><span class="chapter-prog">未入力 ' +
              blank +
              " / 全 " +
              items.length +
              "</span></div>";
            items.forEach(function (it) {
              var r = resp(it.id);
              html += '<div class="item" data-id="' + it.id + '">';
              html +=
                '<div class="item-top"><span class="item-id">' +
                esc(it.id) +
                '</span><span class="badge sev-' +
                it.severity +
                '">' +
                SEV_LABEL[it.severity] +
                '</span><span class="who">対象: ' +
                esc(whoLabel(it.who)) +
                "</span></div>";
              html += '<div class="q">' + esc(it.question) + "</div>";
              html += '<div class="aw">';
              ["known", "vague", "unknown"].forEach(function (v) {
                html +=
                  '<button type="button" data-act="aw" data-id="' +
                  it.id +
                  '" data-val="' +
                  v +
                  '" class="' +
                  (r.awareness === v ? "on" : "") +
                  '">' +
                  AW_LABEL[v] +
                  "</button>";
              });
              html += "</div>";
              html +=
                '<textarea data-act="answer" data-id="' +
                it.id +
                '" placeholder="回答・メモ（任意）"></textarea>';
              html += '<div class="saved" data-saved="' + it.id + '"></div>';
              html += "</div>";
            });
            html += "</section>";
          });
          view.innerHTML = html;
          // set textarea values safely via property
          var areas = view.querySelectorAll('textarea[data-act="answer"]');
          for (var i = 0; i < areas.length; i++) {
            areas[i].value = resp(areas[i].getAttribute("data-id")).answer || "";
          }
          updateProgress();
        }

        function refreshChapterProg(chapterId) {
          var items = ITEMS.filter(function (it) {
            return it.chapter === chapterId;
          });
          var blank = items.filter(function (it) {
            return resp(it.id).awareness == null;
          }).length;
          var sections = view.querySelectorAll(".chapter");
          for (var i = 0; i < sections.length; i++) {
            var idEl = sections[i].querySelector(".chapter-id");
            if (idEl && idEl.textContent === chapterId) {
              sections[i].querySelector(".chapter-prog").textContent =
                "未入力 " + blank + " / 全 " + items.length;
            }
          }
        }

        // ---------- review mode ----------
        function awRank(a) {
          if (a === "unknown") return 0;
          if (a === "vague") return 1;
          if (a == null) return 2; // 未入力
          return 3; // known
        }
        function sevRank(s) {
          return s === "high" ? 0 : s === "mid" ? 1 : 2;
        }
        function stateKey(a) {
          return a == null ? "none" : a;
        }
        function stateLabel(a) {
          if (a === "unknown") return "わからない";
          if (a === "vague") return "曖昧";
          if (a === "known") return "わかる";
          return "未入力";
        }

        function renderReview() {
          // summary counts
          var byAw = { known: 0, vague: 0, unknown: 0, none: 0 };
          var cross = {
            high: { known: 0, vague: 0, unknown: 0, none: 0 },
            mid: { known: 0, vague: 0, unknown: 0, none: 0 },
            low: { known: 0, vague: 0, unknown: 0, none: 0 },
          };
          ITEMS.forEach(function (it) {
            var k = stateKey(resp(it.id).awareness);
            byAw[k]++;
            cross[it.severity][k]++;
          });

          var html = "";
          html += '<div class="summary">';
          html += "<h2>サマリー（炙り出し）</h2>";
          html += '<div class="counts">';
          html +=
            '<span class="count st-unknown">わからない <b>' + byAw.unknown + "</b></span>";
          html += '<span class="count st-vague">曖昧 <b>' + byAw.vague + "</b></span>";
          html += '<span class="count st-none">未入力 <b>' + byAw.none + "</b></span>";
          html += '<span class="count st-known">わかる <b>' + byAw.known + "</b></span>";
          html += "</div>";
          html +=
            '<table class="cross"><thead><tr><th>重要度＼把握度</th><th>わからない</th><th>曖昧</th><th>未入力</th><th>わかる</th></tr></thead><tbody>';
          [
            ["high", "高"],
            ["mid", "中"],
            ["low", "低"],
          ].forEach(function (row) {
            var sev = row[0];
            html += '<tr><td class="rowhead">' + row[1] + "</td>";
            ["unknown", "vague", "none", "known"].forEach(function (col) {
              var n = cross[sev][col];
              var alert = sev === "high" && col !== "known" && n > 0;
              html += '<td class="' + (alert ? "alert" : "") + '">' + n + "</td>";
            });
            html += "</tr>";
          });
          html += "</tbody></table>";
          html +=
            '<div class="progress-label" style="color:var(--ink-soft);margin-top:8px">' +
            "赤いセルは「重要度 高なのに、わかる以外（要対応）」の件数です。" +
            "</div>";
          html += "</div>";

          // filters
          html += '<div class="filters">';
          html += '<div class="group"><span class="glabel">把握度</span>';
          [
            ["unknown", "わからない"],
            ["vague", "曖昧"],
            ["none", "未入力"],
            ["known", "わかる"],
          ].forEach(function (f) {
            html +=
              '<button class="chip ' +
              (filters.awareness.has(f[0]) ? "on" : "") +
              '" data-fil="awareness" data-val="' +
              f[0] +
              '">' +
              f[1] +
              "</button>";
          });
          html += "</div>";
          html += '<div class="group"><span class="glabel">重要度</span>';
          [
            ["high", "高"],
            ["mid", "中"],
            ["low", "低"],
          ].forEach(function (f) {
            html +=
              '<button class="chip ' +
              (filters.severity.has(f[0]) ? "on" : "") +
              '" data-fil="severity" data-val="' +
              f[0] +
              '">' +
              f[1] +
              "</button>";
          });
          html += "</div>";
          html += '<div class="group"><span class="glabel">章</span>';
          CHAPTERS.forEach(function (ch) {
            html +=
              '<button class="chip ' +
              (filters.chapter.has(ch.id) ? "on" : "") +
              '" data-fil="chapter" data-val="' +
              ch.id +
              '">' +
              esc(ch.id) +
              "</button>";
          });
          html += "</div>";
          html += "</div>";

          // sorted + filtered list (holes on top)
          var list = ITEMS.filter(function (it) {
            var sKey = stateKey(resp(it.id).awareness);
            if (filters.awareness.size && !filters.awareness.has(sKey)) return false;
            if (filters.severity.size && !filters.severity.has(it.severity)) return false;
            if (filters.chapter.size && !filters.chapter.has(it.chapter)) return false;
            return true;
          });
          list.sort(function (a, b) {
            var ra = awRank(resp(a.id).awareness);
            var rb = awRank(resp(b.id).awareness);
            if (ra !== rb) return ra - rb;
            var sa = sevRank(a.severity);
            var sb = sevRank(b.severity);
            if (sa !== sb) return sa - sb;
            return a.id < b.id ? -1 : a.id > b.id ? 1 : 0;
          });

          if (!list.length) {
            html += '<div class="empty-list">条件に合う項目がありません。</div>';
          } else {
            list.forEach(function (it) {
              var r = resp(it.id);
              var sk = stateKey(r.awareness);
              html += '<div class="ritem aw-' + sk + '">';
              html +=
                '<div class="item-top"><span class="item-id">' +
                esc(it.id) +
                '</span><span class="rstate st-' +
                sk +
                '">' +
                stateLabel(r.awareness) +
                '</span><span class="badge sev-' +
                it.severity +
                '">' +
                SEV_LABEL[it.severity] +
                '</span><span class="who">対象: ' +
                esc(whoLabel(it.who)) +
                "</span></div>";
              html += '<div class="q">' + esc(it.question) + "</div>";
              if (r.answer && r.answer.trim()) {
                html += '<div class="answer">' + esc(r.answer) + "</div>";
              } else {
                html += '<div class="answer empty">回答なし</div>';
              }
              html += "</div>";
            });
          }

          view.innerHTML = html;
          updateProgress();
        }

        function render() {
          if (mode === "input") renderInput();
          else renderReview();
        }

        // ---------- events ----------
        view.addEventListener("click", function (e) {
          var btn = e.target.closest ? e.target.closest("button") : null;
          if (!btn) return;
          if (btn.getAttribute("data-act") === "aw") {
            var id = btn.getAttribute("data-id");
            var val = btn.getAttribute("data-val");
            setAwareness(id, val);
            // update buttons in this item
            var item = btn.closest(".item");
            var current = resp(id).awareness;
            var bs = item.querySelectorAll('button[data-act="aw"]');
            for (var i = 0; i < bs.length; i++) {
              bs[i].classList.toggle("on", bs[i].getAttribute("data-val") === current);
            }
            var savedEl = item.querySelector('[data-saved="' + id + '"]');
            if (savedEl) savedEl.textContent = "保存しました";
            refreshChapterProg(ITEMS.filter(function(x){return x.id===id;})[0].chapter);
            updateProgress();
            return;
          }
          if (btn.getAttribute("data-fil")) {
            var grp = btn.getAttribute("data-fil");
            var fv = btn.getAttribute("data-val");
            if (filters[grp].has(fv)) filters[grp].delete(fv);
            else filters[grp].add(fv);
            renderReview();
            return;
          }
        });

        view.addEventListener("input", function (e) {
          var t = e.target;
          if (t && t.getAttribute && t.getAttribute("data-act") === "answer") {
            var id = t.getAttribute("data-id");
            setAnswer(id, t.value);
            var savedEl = view.querySelector('[data-saved="' + id + '"]');
            if (savedEl) savedEl.textContent = "保存中…";
            setTimeout(function () {
              if (savedEl) savedEl.textContent = "保存しました";
            }, 400);
          }
        });

        // mode toggle
        document.getElementById("mode-input").addEventListener("click", function () {
          mode = "input";
          this.classList.add("active");
          document.getElementById("mode-review").classList.remove("active");
          render();
        });
        document.getElementById("mode-review").addEventListener("click", function () {
          mode = "review";
          this.classList.add("active");
          document.getElementById("mode-input").classList.remove("active");
          render();
        });

        // ---------- data exchange ----------
        function download(filename, text, type) {
          var blob = new Blob([text], { type: type });
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(function () {
            URL.revokeObjectURL(url);
          }, 0);
        }

        function dateStamp() {
          var d = new Date();
          function p(n) {
            return (n < 10 ? "0" : "") + n;
          }
          return (
            d.getFullYear() +
            p(d.getMonth() + 1) +
            p(d.getDate()) +
            "_" +
            p(d.getHours()) +
            p(d.getMinutes())
          );
        }

        document.getElementById("btn-export-json").addEventListener("click", function () {
          var payload = {
            app: "kraftbase_staff_check",
            version: 1,
            exportedAt: new Date().toISOString(),
            responses: responses,
          };
          download(
            "kraftbase_staff_check_" + dateStamp() + ".json",
            JSON.stringify(payload, null, 2),
            "application/json"
          );
        });

        document.getElementById("btn-import-json").addEventListener("click", function () {
          document.getElementById("file-input").click();
        });

        document.getElementById("file-input").addEventListener("change", function (e) {
          var file = e.target.files && e.target.files[0];
          if (!file) return;
          var reader = new FileReader();
          reader.onload = function () {
            try {
              var parsed = JSON.parse(reader.result);
              var incoming =
                parsed && parsed.responses && typeof parsed.responses === "object"
                  ? parsed.responses
                  : parsed;
              if (!incoming || typeof incoming !== "object") {
                alert("読み込めませんでした：JSONの形式が不正です。");
                return;
              }
              if (
                !window.confirm(
                  "現在の入力内容を、読み込むファイルの内容で上書きします。よろしいですか？"
                )
              ) {
                return;
              }
              responses = incoming;
              persist();
              render();
              alert("読み込みました。");
            } catch (err) {
              alert("読み込めませんでした：" + err.message);
            } finally {
              e.target.value = "";
            }
          };
          reader.readAsText(file);
        });

        document.getElementById("btn-export-md").addEventListener("click", function () {
          var done = answeredCount();
          var lines = [];
          lines.push("# KRAFT BASE スタッフ把握度チェック");
          lines.push("");
          lines.push("書き出し: " + new Date().toISOString());
          lines.push("全 " + ITEMS.length + " 項目 / 把握度入力済み " + done + " / 未入力 " + (ITEMS.length - done));
          lines.push("");
          CHAPTERS.forEach(function (ch) {
            lines.push("## " + ch.id + " " + ch.title);
            lines.push("");
            ITEMS.filter(function (it) {
              return it.chapter === ch.id;
            }).forEach(function (it) {
              var r = resp(it.id);
              lines.push(
                "### [" +
                  it.id +
                  "] 把握度: " +
                  stateLabel(r.awareness) +
                  " ／ " +
                  SEV_LABEL[it.severity] +
                  " ／ 対象: " +
                  whoLabel(it.who)
              );
              lines.push("- 質問: " + it.question);
              lines.push("- 回答: " + (r.answer && r.answer.trim() ? r.answer.replace(/\n/g, " ") : "回答なし"));
              lines.push("");
            });
          });
          download(
            "kraftbase_staff_check_" + dateStamp() + ".md",
            lines.join("\n"),
            "text/markdown"
          );
        });

        render();
      })();
    </script>
  </body>
</html>
